networks:
  app_net:
    driver: bridge
  monitoring_net:
    driver: bridge

services:
  backend:
    build: ./server
    expose:
      - "8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  frontend:
    build: ./client
    expose:
      - "5173"
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - app_net
    depends_on:
      - backend
      
  postgres:
    image: postgres:17.5
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - app_net
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1 "]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
  
  nginx:
    build: ./nginx
    ports:
      - "8000:80"
      - "8443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - app_net

volumes:
  pg_data:
    driver: local