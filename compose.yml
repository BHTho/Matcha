networks:
  app_net:
    driver: bridge
  monitoring_net:
    driver: bridge

services:
  backend:
    build: ./server
    expose:
      - 8000
    #ports:
    #  - "8000:8000"
    networks:
      - app_net

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - app_net
    depends_on:
      - backend