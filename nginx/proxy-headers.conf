# preserve header
proxy_set_header Host $host;
# pass on client IP
proxy_set_header X-Real-IP $remote_addr;
# appends the current client IP to any existing X-Forwarded-For chain
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# The original protocol (http/https) used by the client
proxy_set_header X-Forwarded-Proto $scheme;
# use HTTP1.1 for websockets
proxy_http_version 1.1;
# Forwards the client's Upgrade header
proxy_set_header Upgrade $http_upgrade;
# Works with the Upgrade header to enable WebSocket connections
proxy_set_header Connection "upgrade";